<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="input-div">
            <label for="text-producto">Producto</label>
            <input class="input-element" id="text-producto" type="text" placeholder="Producto">
        </div>
        <div class="input-div">
            <label for="combo-box-categoria">categoria</label>
            <select class="input-element" name="categoria" id="combo-box-categoria">
                <option value="alimento">Alimento</option>
                <option value="ropa">Ropa</option>
                <option value="oficina">Oficina</option>
            </select>
        </div>
        <div class="input-div">
            <label for="number-precio">Precio</label>
            <input class="input-element" id="number-precio" type="number" step="0.01" min="0.00" value="1">
        </div>
        <button class="input-element" id="button-guardar">Guardar</button>
        <ul id="lista-padre">
            <li class="lista-hijo" id="list-title">
                <p>Producto</p>
                <p>Categoria</p>
                <p>Precio</p>
                <span></span>
                <span></span>
                <span></span>
            </li>
        </ul>
    </main>
    <script src="script.js"></script>
</body>

</html>
